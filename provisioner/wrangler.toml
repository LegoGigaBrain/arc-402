name = "arc402-provisioner"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
CF_ACCOUNT_ID = "c7fe113d3651eba09a92c8a3cb8619bb"
CF_ZONE_ID = "69161b69f1fde206874f69a2b9b21033"
BASE_RPC_URL = "https://base-mainnet.g.alchemy.com/v2/YIA2uRCsFI-j5pqH-aRzflrACSlV1Qrs"

# Secrets (set via wrangler secret put):
#   CF_API_TOKEN — Cloudflare API token with Tunnel + DNS + Workers permissions

# KV namespace from arc402-subdomain-worker (ownership + rate limiting)
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "8fac3208d431488d9a1d2687b3112b33"

[[routes]]
pattern = "api.arc402.xyz/*"
zone_name = "arc402.xyz"
