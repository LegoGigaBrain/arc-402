      abis:
        - name: ReputationOracle
          file: ReputationOracle/abis/ReputationOracle.json
      eventHandlers:
        - event: SignalPublished(indexed address,indexed address,uint8,bytes32,uint256,bool)
          handler: handleSignalPublished
      file: ReputationOracle/ReputationOracle.wasm
  - kind: ethereum
    name: TrustRegistry
    network: base-sepolia
    source:
      address: "0x1D38Cf67686820D970C146ED1CC98fc83613f02B"
      abi: TrustRegistry
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - TrustScoreV1
      abis:
        - name: TrustRegistry
          file: TrustRegistry/abis/TrustRegistry.json
      eventHandlers:
        - event: WalletInitialized(indexed address,uint256)
          handler: handleTrustV1WalletInitialized
        - event: ScoreUpdated(indexed address,uint256,uint256,string)
          handler: handleTrustV1ScoreUpdated
      file: TrustRegistry/TrustRegistry.wasm
  - kind: ethereum
    name: TrustRegistrySA
    network: base-sepolia
    source:
      address: "0xbd3f2f15f794fde8b3a59b6643e4b7e985ee1389"
      abi: TrustRegistry
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - TrustScoreV1
      abis:
        - name: TrustRegistry
          file: TrustRegistrySA/abis/TrustRegistry.json
      eventHandlers:
        - event: WalletInitialized(indexed address,uint256)
          handler: handleTrustV1WalletInitialized
        - event: ScoreUpdated(indexed address,uint256,uint256,string)
          handler: handleTrustV1ScoreUpdated
      file: TrustRegistry/TrustRegistry.wasm
  - kind: ethereum
    name: IntentAttestation
    network: base-sepolia
    source:
      address: "0x942c807Cc6E0240A061e074b61345618aBadc457"
      abi: IntentAttestation
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - IntentAttestation
      abis:
        - name: IntentAttestation
          file: IntentAttestation/abis/IntentAttestation.json
      eventHandlers:
        - event: AttestationCreated(indexed bytes32,indexed address,string,address,uint256)
          handler: handleAttestationCreated
      file: IntentAttestation/IntentAttestation.wasm
  - kind: ethereum
    name: SettlementCoordinator
    network: base-sepolia
    source:
      address: "0x52b565797975781f069368Df40d6633b2aD03390"
      abi: SettlementCoordinator
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
