specVersion: 0.0.5
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum
    name: AgentRegistry
    network: base-sepolia
    source:
      address: "0x07D526f8A8e148570509aFa249EFF295045A0cc9"
      abi: AgentRegistry
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Agent
        - ProtocolStats
      abis:
        - name: AgentRegistry
          file: AgentRegistry/abis/AgentRegistry.json
      eventHandlers:
        - event: AgentRegistered(indexed address,string,string,uint256)
          handler: handleAgentRegistered
        - event: AgentUpdated(indexed address,string,string)
          handler: handleAgentUpdated
        - event: AgentDeactivated(indexed address)
          handler: handleAgentDeactivated
        - event: AgentReactivated(indexed address)
          handler: handleAgentReactivated
        - event: EndpointChanged(indexed address,string,string,uint256)
          handler: handleEndpointChanged
        - event: HeartbeatSubmitted(indexed address,uint256,uint256,uint256,uint256,uint256)
          handler: handleHeartbeatSubmitted
      file: AgentRegistry/AgentRegistry.wasm
  - kind: ethereum
    name: WalletFactory
    network: base-sepolia
    source:
      address: "0xD560C22aD5372Aa830ee5ffBFa4a5D9f528e7B87"
      abi: WalletFactory
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Wallet
        - ProtocolStats
      abis:
        - name: WalletFactory
          file: WalletFactory/abis/WalletFactory.json
      eventHandlers:
        - event: WalletCreated(indexed address,indexed address)
          handler: handleWalletCreated
      file: WalletFactory/WalletFactory.wasm
  - kind: ethereum
    name: PolicyEngine
    network: base-sepolia
    source:
      address: "0x44102e70c2A366632d98Fe40d892a2501fC7fFF2"
      abi: PolicyEngine
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Policy
        - Wallet
      abis:
        - name: PolicyEngine
          file: PolicyEngine/abis/PolicyEngine.json
      eventHandlers:
        - event: CategoryLimitSet(indexed address,string,uint256)
          handler: handleCategoryLimitSet
      file: PolicyEngine/PolicyEngine.wasm
  - kind: ethereum
    name: ServiceAgreement
    network: base-sepolia
    source:
      address: "0xa214d30906a934358f451514da1ba732ad79f158"
      abi: ServiceAgreement
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Agreement
        - Dispute
        - ProtocolStats
      abis:
        - name: ServiceAgreement
          file: ServiceAgreement/abis/ServiceAgreement.json
      eventHandlers:
        - event: AgreementProposed(indexed uint256,indexed address,indexed
            address,string,uint256,address,uint256)
          handler: handleAgreementProposed
        - event: AgreementAccepted(indexed uint256,indexed address)
          handler: handleAgreementAccepted
        - event: AgreementFulfilled(indexed uint256,indexed address,bytes32)
          handler: handleAgreementFulfilled
        - event: AgreementDisputed(indexed uint256,indexed address,string)
          handler: handleAgreementDisputed
        - event: AgreementCancelled(indexed uint256,indexed address)
          handler: handleAgreementCancelled
        - event: DetailedDisputeResolved(indexed uint256,uint8,uint256,uint256)
          handler: handleDisputeResolved
      file: ServiceAgreement/ServiceAgreement.wasm
  - kind: ethereum
    name: SessionChannels
    network: base-sepolia
    source:
      address: "0x21340f81f5ddc9c213ff2ac45f0f34fb2449386d"
      abi: SessionChannels
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Channel
        - ProtocolStats
      abis:
        - name: SessionChannels
          file: SessionChannels/abis/SessionChannels.json
      eventHandlers:
        - event: ChannelOpened(indexed bytes32,indexed address,indexed
            address,address,uint256,uint256)
          handler: handleChannelOpened
        - event: ChannelClosing(indexed bytes32,uint256,uint256,uint256)
          handler: handleChannelClosing
        - event: ChannelSettled(indexed bytes32,indexed address,uint256,uint256)
          handler: handleChannelSettled
        - event: ChannelChallenged(indexed bytes32,indexed address,uint256,uint256)
          handler: handleChannelChallenged
        - event: ChallengeFinalised(indexed bytes32,indexed address,uint256)
          handler: handleChallengeFinalised
        - event: ChannelExpiredReclaimed(indexed bytes32,indexed address,uint256)
          handler: handleChannelExpired
      file: SessionChannels/SessionChannels.wasm
  - kind: ethereum
    name: TrustRegistryV2
    network: base-sepolia
    source:
      address: "0xfCc2CDC42654e05Dad5F6734cE5caFf3dAE0E94F"
