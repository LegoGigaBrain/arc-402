      abis:
        - name: SettlementCoordinator
          file: SettlementCoordinator/abis/SettlementCoordinator.json
      eventHandlers:
        - event: ProposalCreated(indexed bytes32,indexed address,indexed address,uint256)
          handler: handleProposalCreated
        - event: ProposalAccepted(indexed bytes32)
          handler: handleProposalAccepted
        - event: ProposalExecuted(indexed bytes32,uint256)
          handler: handleProposalExecuted
        - event: ProposalRejected(indexed bytes32,string)
          handler: handleProposalRejected
        - event: ProposalExpired(indexed bytes32)
          handler: handleProposalExpired
      file: SettlementCoordinator/SettlementCoordinator.wasm
  - kind: ethereum
    name: SponsorshipAttestation
    network: base-sepolia
    source:
      address: "0xc0d927745AcF8DEeE551BE11A12c97c492DDC989"
      abi: SponsorshipAttestation
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - SponsorshipAttestation
      abis:
        - name: SponsorshipAttestation
          file: SponsorshipAttestation/abis/SponsorshipAttestation.json
      eventHandlers:
